apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Reference base configuration
resources:
  - ../../base

# Production environment namespace
namespace: dp-prod

# Environment-specific labels
commonLabels:
  environment: prod

# Production-specific patches for security and resource limits
patches:
  - patch: |-
      - op: replace
        path: /data/DP_LOG_LEVEL
        value: warn
    target:
      kind: ConfigMap
      name: dp-config

# Production-specific configuration
configMapGenerator:
  - name: dp-env-config
    behavior: create
    literals:
      - ENVIRONMENT=prod
      - S3_ENDPOINT=https://s3.us-east-1.amazonaws.com
      - KAFKA_BROKERS=kafka-prod.dp-prod:9092
      - REGISTRY_URL=ghcr.io/infoblox-cto/dp
      - METRICS_ENABLED=true
      - TRACING_ENABLED=true
