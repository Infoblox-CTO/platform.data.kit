apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Reference base configuration
resources:
  - ../../base

# Development environment namespace
namespace: dp-dev

# Environment-specific labels
commonLabels:
  environment: dev

# Environment-specific patches
patches:
  - patch: |-
      - op: replace
        path: /data/DP_LOG_LEVEL
        value: debug
    target:
      kind: ConfigMap
      name: dp-config

# Development-specific configuration
configMapGenerator:
  - name: dp-env-config
    behavior: create
    literals:
      - ENVIRONMENT=dev
      - S3_ENDPOINT=http://localstack.dp-dev:4566
      - KAFKA_BROKERS=redpanda.dp-dev:9092
      - REGISTRY_URL=ghcr.io/infoblox-cto/dp-dev
