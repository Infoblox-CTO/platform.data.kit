apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Reference base configuration
resources:
  - ../../base

# Integration environment namespace
namespace: dp-int

# Environment-specific labels
commonLabels:
  environment: int

# Integration-specific configuration
configMapGenerator:
  - name: dp-env-config
    behavior: create
    literals:
      - ENVIRONMENT=int
      - S3_ENDPOINT=https://s3.us-east-1.amazonaws.com
      - KAFKA_BROKERS=kafka-int.dp-int:9092
      - REGISTRY_URL=ghcr.io/infoblox-cto/dp
