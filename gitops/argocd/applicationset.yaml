apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: dk-environments
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - environment: dev
            cluster: in-cluster
            namespace: dk-dev
            autoSync: true
            selfHeal: true
          - environment: int
            cluster: in-cluster
            namespace: dk-int
            autoSync: true
            selfHeal: true
          - environment: prod
            cluster: in-cluster
            namespace: dk-prod
            autoSync: false
            selfHeal: false
  template:
    metadata:
      name: dk-{{environment}}
      namespace: argocd
      labels:
        app.kubernetes.io/name: dp
        app.kubernetes.io/component: platform
        app.kubernetes.io/part-of: dp
        datakit.infoblox.dev/environment: "{{environment}}"
      annotations:
        notifications.argoproj.io/subscribe.on-sync-succeeded.slack: dk-alerts
        notifications.argoproj.io/subscribe.on-sync-failed.slack: dk-alerts
        notifications.argoproj.io/subscribe.on-health-degraded.slack: dk-alerts
    spec:
      project: default
      source:
        repoURL: https://github.com/Infoblox-CTO/platform.data.kit.git
        targetRevision: main
        path: gitops/environments/{{environment}}
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{namespace}}"
      syncPolicy:
        automated:
          prune: "{{autoSync}}"
          selfHeal: "{{selfHeal}}"
          allowEmpty: false
        syncOptions:
          - CreateNamespace=true
          - PrunePropagationPolicy=foreground
          - PruneLast=true
          - RespectIgnoreDifferences=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
      revisionHistoryLimit: 10
      ignoreDifferences:
        - group: ""
          kind: Secret
          jsonPointers:
            - /data
        - group: apps
          kind: Deployment
          jsonPointers:
            - /spec/replicas
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: dp
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: DataKit Project
  sourceRepos:
    - https://github.com/Infoblox-CTO/platform.data.kit.git
    - ghcr.io/infoblox-cto/*
  destinations:
    - namespace: dk-*
      server: https://kubernetes.default.svc
    - namespace: dk-system
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
  namespaceResourceWhitelist:
    - group: ""
      kind: "*"
    - group: apps
      kind: "*"
    - group: batch
      kind: "*"
    - group: datakit.infoblox.dev
      kind: "*"
  roles:
    - name: admin
      description: DK admin role
      policies:
        - p, proj:dk:admin, applications, *, dk/*, allow
      groups:
        - dk-admins
    - name: readonly
      description: DK read-only role
      policies:
        - p, proj:dk:readonly, applications, get, dk/*, allow
      groups:
        - dk-viewers
