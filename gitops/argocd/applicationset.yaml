apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: dk-apps
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - git:
        repoURL: https://github.com/Infoblox-CTO/platform.data.kit.git
        revision: main
        directories:
          - path: envs/*/cells/*/apps/*
  template:
    metadata:
      # Name: {env}-{cell}-{app}
      name: "{{ index .path.segments 1 }}-{{ index .path.segments 3 }}-{{ .path.basename }}"
      namespace: argocd
      labels:
        app.kubernetes.io/name: "{{ .path.basename }}"
        app.kubernetes.io/component: package
        app.kubernetes.io/part-of: dk
        datakit.infoblox.dev/environment: "{{ index .path.segments 1 }}"
        datakit.infoblox.dev/cell: "{{ index .path.segments 3 }}"
      annotations:
        notifications.argoproj.io/subscribe.on-sync-succeeded.slack: dk-alerts
        notifications.argoproj.io/subscribe.on-sync-failed.slack: dk-alerts
        notifications.argoproj.io/subscribe.on-health-degraded.slack: dk-alerts
    spec:
      project: dk
      source:
        repoURL: https://github.com/Infoblox-CTO/platform.data.kit.git
        targetRevision: main
        path: gitops/charts/dk-app
        helm:
          releaseName: "{{ .path.basename }}"
          valueFiles:
            - "../../../{{ .path.path }}/values.yaml"
          parameters:
            - name: cell
              value: "{{ index .path.segments 3 }}"
      destination:
        server: https://kubernetes.default.svc
        namespace: "dk-{{ index .path.segments 1 }}-{{ index .path.segments 3 }}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
          allowEmpty: false
        syncOptions:
          - CreateNamespace=true
          - PrunePropagationPolicy=foreground
          - PruneLast=true
          - RespectIgnoreDifferences=true
        retry:
          limit: 5
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
      revisionHistoryLimit: 10
      ignoreDifferences:
        - group: ""
          kind: Secret
          jsonPointers:
            - /data
        - group: apps
          kind: Deployment
          jsonPointers:
            - /spec/replicas
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: dk
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: DataKit Project
  sourceRepos:
    - https://github.com/Infoblox-CTO/platform.data.kit.git
    - ghcr.io/infoblox-cto/*
  destinations:
    - namespace: dk-*
      server: https://kubernetes.default.svc
    - namespace: dk-system
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
  namespaceResourceWhitelist:
    - group: ""
      kind: "*"
    - group: apps
      kind: "*"
    - group: batch
      kind: "*"
    - group: datakit.infoblox.dev
      kind: "*"
  roles:
    - name: admin
      description: DK admin role
      policies:
        - p, proj:dk:admin, applications, *, dk/*, allow
      groups:
        - dk-admins
    - name: readonly
      description: DK read-only role
      policies:
        - p, proj:dk:readonly, applications, get, dk/*, allow
      groups:
        - dk-viewers
