apiVersion: v1
kind: Namespace
metadata:
  name: dp-system
  labels:
    app.kubernetes.io/name: dp
    app.kubernetes.io/component: controller
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dp-controller
  namespace: dp-system
  labels:
    app.kubernetes.io/name: dp
    app.kubernetes.io/component: controller
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: dp-controller-role
  labels:
    app.kubernetes.io/name: dp
    app.kubernetes.io/component: controller
rules:
  - apiGroups:
      - dp.io
    resources:
      - packagedeployments
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - dp.io
    resources:
      - packagedeployments/status
    verbs:
      - get
      - update
      - patch
  - apiGroups:
      - dp.io
    resources:
      - packagedeployments/finalizers
    verbs:
      - update
  - apiGroups:
      - batch
    resources:
      - jobs
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - ""
    resources:
      - configmaps
      - secrets
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - create
      - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: dp-controller-rolebinding
  labels:
    app.kubernetes.io/name: dp
    app.kubernetes.io/component: controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: dp-controller-role
subjects:
  - kind: ServiceAccount
    name: dp-controller
    namespace: dp-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dp-controller
  namespace: dp-system
  labels:
    app.kubernetes.io/name: dp
    app.kubernetes.io/component: controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dp
      app.kubernetes.io/component: controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dp
        app.kubernetes.io/component: controller
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
    spec:
      serviceAccountName: dp-controller
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: controller
          image: ghcr.io/infoblox-cto/dp-controller:latest
          imagePullPolicy: Always
          args:
            - --leader-elect
            - --health-probe-bind-address=:8081
            - --metrics-bind-address=:8080
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 500m
              memory: 128Mi
            requests:
              cpu: 10m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
      terminationGracePeriodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: dp-controller-metrics
  namespace: dp-system
  labels:
    app.kubernetes.io/name: dp
    app.kubernetes.io/component: controller
spec:
  selector:
    app.kubernetes.io/name: dp
    app.kubernetes.io/component: controller
  ports:
    - name: metrics
      port: 8080
      targetPort: metrics
      protocol: TCP
