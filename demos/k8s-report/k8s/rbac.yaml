---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dk-k8s-reader
  namespace: dk-local
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: dk-k8s-reader
rules:
  - apiGroups: [""]
    resources:
      - namespaces
      - pods
      - services
      - configmaps
      - secrets
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources:
      - deployments
      - replicasets
      - statefulsets
      - daemonsets
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources:
      - jobs
      - cronjobs
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: dk-k8s-reader
subjects:
  - kind: ServiceAccount
    name: dk-k8s-reader
    namespace: dk-local
roleRef:
  kind: ClusterRole
  name: dk-k8s-reader
  apiGroup: rbac.authorization.k8s.io
