            {
              "datasource": {
                "type": "prometheus",
                "uid": "${DS_PROMETHEUS}"
              },
              "expr": "rate(dp_runs_total{package=~\"$package\", environment=~\"$environment\"}[5m])",
              "legendFormat": "{{package}} - {{environment}} - {{status}}",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
