apiVersion: data.infoblox.com/v1alpha1
kind: Model
metadata:
  name: test-pipeline
  namespace: default
  version: 1.0.0
  labels:
    team: platform
spec:
  runtime: generic-go
  mode: batch
  description: A test model for CLI testing
  owner: platform-team
  image: myimage:v1
  inputs:
    - name: kafka-events
      type: kafka-topic
      binding: kafka-input
  outputs:
    - name: s3-data
      type: s3-prefix
      binding: s3-output
      classification:
        sensitivity: internal
        pii: false
