apiVersion: data.infoblox.com/v1alpha1
kind: Model
metadata:
  name: pii-violation-pkg
  namespace: data-team
  version: 1.0.0
spec:
  description: A model with outputs but no classification
  owner: data-team
  runtime: generic-go
  image: myimage:v1
  mode: batch
  outputs:
    - name: customer-emails
      type: s3-prefix
      binding: emails-bucket
      # classification is missing - this should fail PII validation
    - name: user-addresses
      type: s3-prefix
      binding: addresses-bucket
      # classification is missing - this should also fail
