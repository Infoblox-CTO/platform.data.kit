apiVersion: datakit.infoblox.dev/v1alpha1
kind: Transform
metadata:
  name: sample-pipeline
  namespace: data-team
  version: 1.0.0
  labels:
    team: analytics
    tier: gold
  annotations:
    description: Sample pipeline for testing
spec:
  runtime: generic-go
  mode: batch
  image: myimage:v1
  inputs:
    - dataset: raw-events
  outputs:
    - dataset: processed-events
  schedule:
    cron: "0 */6 * * *"
  timeout: 1h
  resources:
    requests:
      cpu: "2"
      memory: 4Gi
    limits:
      cpu: "2"
      memory: 4Gi
