apiVersion: data.infoblox.com/v1alpha1
kind: Model
metadata:
  name: basic-pipeline
  namespace: data-team
  version: 1.0.0
spec:
  description: A basic model package for testing
  owner: data-team
  runtime: generic-go
  image: myimage:v1
  mode: batch
  outputs:
    - name: customer-data
      type: s3-prefix
      binding: customer-data-bucket
      classification:
        sensitivity: public
        pii: false
