apiVersion: data.infoblox.com/v1alpha1
kind: DataPackage
metadata:
  name: pipeline-with-assets
  namespace: data-team
  version: 1.0.0
spec:
  type: pipeline
  description: A pipeline package with asset references
  owner: data-team
  runtime:
    image: myimage:v1
  assets:
    - aws-security
    - raw-output
  outputs:
    - name: customer-data
      type: s3-prefix
      binding: customer-data-bucket
      classification:
        sensitivity: public
        pii: false
