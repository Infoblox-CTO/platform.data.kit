# PostgreSQL values for dp local development
# These values configure the upstream bitnami/postgresql subchart for dev use.

postgresql:
  architecture: standalone

  auth:
    postgresPassword: devpassword
    username: dpuser
    password: dppassword
    database: dataplatform

  primary:
    persistence:
      enabled: false
    resourcesPreset: nano
    initdb:
      user: postgres
      password: devpassword
      scripts:
        init-schemas.sql: |
          -- Create marquez role (used by Marquez API's built-in dev config)
          DO $$
          BEGIN
            IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'marquez') THEN
              CREATE ROLE marquez WITH LOGIN PASSWORD 'marquez';
            END IF;
          END
          $$;

          -- Create additional databases for dev services
          SELECT 'CREATE DATABASE marquez OWNER marquez' WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'marquez')\gexec
          SELECT 'CREATE DATABASE lineage' WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'lineage')\gexec

          -- Grant marquez user full access to its database
          GRANT ALL PRIVILEGES ON DATABASE marquez TO marquez;

          -- Connect to dataplatform DB and create schemas
          \c dataplatform
          CREATE SCHEMA IF NOT EXISTS dp;
          CREATE SCHEMA IF NOT EXISTS staging;
          CREATE SCHEMA IF NOT EXISTS curated;

          -- Grant permissions to dpuser
          GRANT ALL PRIVILEGES ON SCHEMA dp TO dpuser;
          GRANT ALL PRIVILEGES ON SCHEMA staging TO dpuser;
          GRANT ALL PRIVILEGES ON SCHEMA curated TO dpuser;
