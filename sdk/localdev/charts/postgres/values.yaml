# PostgreSQL values for dk local development
# These values configure the upstream bitnami/postgresql subchart for dev use.

postgresql:
  architecture: standalone

  auth:
    postgresPassword: devpassword
    username: dkuser
    password: dkpassword
    database: dataplatform

  primary:
    persistence:
      enabled: false
    resourcesPreset: nano
    initdb:
      user: postgres
      password: devpassword
      scripts:
        init-schemas.sql: |
          -- Create marquez role (used by Marquez API's built-in dev config)
          DO $$
          BEGIN
            IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'marquez') THEN
              CREATE ROLE marquez WITH LOGIN PASSWORD 'marquez';
            END IF;
          END
          $$;

          -- Create additional databases for dev services
          SELECT 'CREATE DATABASE marquez OWNER marquez' WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'marquez')\gexec
          SELECT 'CREATE DATABASE lineage' WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'lineage')\gexec

          -- Grant marquez user full access to its database
          GRANT ALL PRIVILEGES ON DATABASE marquez TO marquez;

          -- Connect to dataplatform DB and create schemas
          \c dataplatform
          CREATE SCHEMA IF NOT EXISTS dk;
          CREATE SCHEMA IF NOT EXISTS staging;
          CREATE SCHEMA IF NOT EXISTS curated;

          -- Grant permissions to dkuser
          GRANT ALL PRIVILEGES ON SCHEMA dk TO dkuser;
          GRANT ALL PRIVILEGES ON SCHEMA staging TO dkuser;
          GRANT ALL PRIVILEGES ON SCHEMA curated TO dkuser;

          -- Create example_table used by the default bootstrapped transform
          -- (dk init <name> --runtime cloudquery) so it works out of the box.
          CREATE TABLE IF NOT EXISTS example_table (
            id SERIAL PRIMARY KEY,
            name VARCHAR(255) NOT NULL,
            created_at TIMESTAMPTZ NOT NULL DEFAULT NOW()
          );
          GRANT ALL PRIVILEGES ON TABLE example_table TO dkuser;
          GRANT USAGE, SELECT ON SEQUENCE example_table_id_seq TO dkuser;

          -- Seed a few rows so the first sync produces visible output.
          INSERT INTO example_table (name) VALUES
            ('alice'),
            ('bob'),
            ('charlie');
