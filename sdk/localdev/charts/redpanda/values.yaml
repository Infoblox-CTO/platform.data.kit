# Redpanda values for dp local development
# These values configure the upstream redpanda subchart for single-node dev use.
# developer_mode skips hardware/memory checks that fail inside k3d.

redpanda:
  statefulset:
    replicas: 1

  config:
    node:
      developer_mode: true

  storage:
    persistentVolume:
      enabled: false

  tls:
    enabled: false

  external:
    enabled: false

  tuning:
    tune_aio_events: false

  resources:
    cpu:
      cores: 1
    memory:
      enable_memory_locking: false
      container:
        max: 2Gi
        min: 2Gi
      redpanda:
        memory: 1Gi
        reserveMemory: 256Mi

  listeners:
    kafka:
      port: 9092
    schemaRegistry:
      port: 8081
    http:
      port: 8082
    admin:
      port: 9644

  console:
    enabled: false
