apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-html
  labels:
    app: dk-dashboard
    app.kubernetes.io/name: dk-dashboard
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="utf-8">
      <meta name="viewport" content="width=device-width, initial-scale=1">
      <title>DataKit Dev Dashboard</title>
      <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
          font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
          background: #0f172a;
          color: #e2e8f0;
          min-height: 100vh;
        }
        .header {
          background: #1e293b;
          border-bottom: 1px solid #334155;
          padding: 1.5rem 2rem;
          display: flex;
          align-items: center;
          gap: 1rem;
        }
        .header h1 { font-size: 1.5rem; font-weight: 600; color: #f8fafc; }
        .header .badge {
          background: #059669;
          color: white;
          font-size: 0.75rem;
          padding: 0.25rem 0.5rem;
          border-radius: 4px;
          font-weight: 500;
        }
        .grid {
          display: grid;
          grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
          gap: 1.25rem;
          padding: 2rem;
          max-width: 1200px;
          margin: 0 auto;
        }
        .card {
          background: #1e293b;
          border: 1px solid #334155;
          border-radius: 8px;
          padding: 1.25rem;
          transition: border-color 0.2s;
        }
        .card:hover { border-color: #475569; }
        .card-header {
          display: flex;
          align-items: center;
          gap: 0.5rem;
          margin-bottom: 0.5rem;
        }
        .card-header h3 { font-size: 1rem; font-weight: 600; color: #f1f5f9; }
        .status-dot {
          width: 10px;
          height: 10px;
          border-radius: 50%;
          flex-shrink: 0;
        }
        .status-healthy { background: #22c55e; box-shadow: 0 0 6px #22c55e88; }
        .status-unhealthy { background: #ef4444; box-shadow: 0 0 6px #ef444488; }
        .status-unknown { background: #64748b; }
        .card-desc {
          font-size: 0.875rem;
          color: #94a3b8;
          margin-bottom: 1rem;
          line-height: 1.4;
        }
        .card-footer { display: flex; align-items: center; }
        .card-link {
          color: #38bdf8;
          text-decoration: none;
          font-size: 0.875rem;
          font-weight: 500;
        }
        .card-link:hover { text-decoration: underline; }
        .card-connection {
          font-family: 'SF Mono', Monaco, monospace;
          font-size: 0.8rem;
          color: #94a3b8;
          background: #0f172a;
          padding: 0.25rem 0.5rem;
          border-radius: 4px;
        }
        .refresh-info {
          text-align: center;
          padding: 1rem;
          color: #64748b;
          font-size: 0.75rem;
        }
      </style>
    </head>
    <body>
      <div class="header">
        <h1>DataKit Dev Dashboard</h1>
        <span class="badge">local &middot; {{ .Values.domain }}</span>
      </div>
      <div class="grid">
        {{- range .Values.services }}
        <div class="card" data-subdomain="{{ .subdomain }}">
          <div class="card-header">
            <span class="status-dot status-unknown"></span>
            <h3>{{ .label }}</h3>
          </div>
          <p class="card-desc">{{ .description }}</p>
          <div class="card-footer">
            <a href="https://{{ .subdomain }}.{{ $.Values.domain }}{{ .defaultPath }}" target="_blank" class="card-link">Open {{ .label }}</a>
          </div>
        </div>
        {{- end }}
        <div class="card">
          <div class="card-header">
            <span class="status-dot status-unknown" id="pg-status"></span>
            <h3>PostgreSQL</h3>
          </div>
          <p class="card-desc">Relational database</p>
          <div class="card-footer">
            <span class="card-connection">localhost:5432</span>
          </div>
        </div>
        <div class="card">
          <div class="card-header">
            <span class="status-dot status-unknown" id="kafka-status"></span>
            <h3>Kafka</h3>
          </div>
          <p class="card-desc">Kafka-compatible message broker</p>
          <div class="card-footer">
            <span class="card-connection">localhost:19092</span>
          </div>
        </div>
      </div>
      <div class="refresh-info">
        Services available at https://&lt;service&gt;.{{ .Values.domain }}
      </div>
      <script>
        async function checkService(subdomain) {
          try {
            const resp = await fetch('https://' + subdomain + '.{{ .Values.domain }}/', {mode: 'no-cors'});
            return true;
          } catch(e) {
            return false;
          }
        }
        async function refreshStatus() {
          document.querySelectorAll('.card[data-subdomain]').forEach(async card => {
            const sub = card.dataset.subdomain;
            const dot = card.querySelector('.status-dot');
            try {
              const ok = await checkService(sub);
              dot.className = 'status-dot ' + (ok ? 'status-healthy' : 'status-unhealthy');
            } catch(e) {
              dot.className = 'status-dot status-unhealthy';
            }
          });
        }
        refreshStatus();
        setInterval(refreshStatus, 10000);
      </script>
    </body>
    </html>
