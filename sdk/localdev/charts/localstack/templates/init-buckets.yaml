apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-init-buckets
  labels:
    app: localstack
    app.kubernetes.io/name: localstack
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 5
  template:
    metadata:
      labels:
        app.kubernetes.io/name: localstack-init-buckets
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      restartPolicy: OnFailure
      containers:
        - name: init-buckets
          image: amazon/aws-cli:2.17.0
          env:
            - name: AWS_ACCESS_KEY_ID
              value: "test"
            - name: AWS_SECRET_ACCESS_KEY
              value: "test"
            - name: AWS_DEFAULT_REGION
              value: "us-east-1"
            - name: AWS_ENDPOINT_URL
              value: "http://{{ .Release.Name }}-localstack:4566"
          command:
            - /bin/bash
            - -c
            - |
              set -e

              # Wait for LocalStack to be ready
              echo "Waiting for LocalStack to be ready..."
              until aws s3 ls 2>/dev/null; do
                echo "LocalStack not ready yet, retrying in 5s..."
                sleep 5
              done

              echo "Creating S3 buckets..."
              {{- range $bucket := list "cdpp-raw" "cdpp-staging" "cdpp-curated" "cdpp-artifacts" "cdpp-test" }}
              aws s3 mb "s3://{{ $bucket }}" 2>/dev/null || echo "Bucket {{ $bucket }} already exists"
              {{- end }}

              echo "All buckets created successfully."
              aws s3 ls
