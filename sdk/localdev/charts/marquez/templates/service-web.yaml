apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-web
  labels:
    app: marquez
    component: web
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.web.port }}
      targetPort: http
      protocol: TCP
  selector:
    app: marquez
    component: web
