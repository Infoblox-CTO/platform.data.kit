apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-web
  labels:
    app: marquez
    component: web
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: marquez
      component: web
  template:
    metadata:
      labels:
        app: marquez
        component: web
    spec:
      containers:
        - name: marquez-web
          image: "{{ .Values.web.image.repository }}:{{ .Values.web.image.tag }}"
          imagePullPolicy: {{ .Values.web.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.web.port }}
              protocol: TCP
          env:
            - name: MARQUEZ_HOST
              value: "{{ .Release.Name }}"
            - name: MARQUEZ_PORT
              value: "{{ .Values.api.port }}"
            - name: WEB_PORT
              value: "{{ .Values.web.port }}"
          livenessProbe:
            httpGet:
              path: /healthcheck
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /healthcheck
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
          resources:
            {{- toYaml .Values.web.resources | nindent 12 }}
