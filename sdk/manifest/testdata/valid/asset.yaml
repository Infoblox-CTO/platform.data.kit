apiVersion: datakit.infoblox.dev/v1alpha1
kind: Asset
metadata:
  name: users
  namespace: data-team
spec:
  store: warehouse
  table: public.users
  classification: internal
  schema:
    - name: id
      type: integer
    - name: email
      type: string
      pii: true
    - name: created_at
      type: timestamp
