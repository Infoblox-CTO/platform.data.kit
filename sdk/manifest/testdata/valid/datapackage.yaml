apiVersion: data.infoblox.com/v1alpha1
kind: Model
metadata:
  name: valid-manifest
  namespace: data-team
  version: 1.0.0
spec:
  description: Valid manifest for parsing tests
  owner: data-team
  runtime: generic-go
  image: myimage:v1
  mode: batch
  outputs:
    - name: output-data
      type: s3-prefix
      binding: output-bucket
      classification:
        sensitivity: internal
        pii: false
