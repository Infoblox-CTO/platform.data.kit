apiVersion: datakit.infoblox.dev/v1alpha1
kind: Pipeline
metadata:
  name: valid-pipeline
spec:
  image: python:3.11
  command: ["python", "-m", "pipeline.main"]
  env:
    - name: LOG_LEVEL
      value: info
    - name: BATCH_SIZE
      value: "1000"
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
