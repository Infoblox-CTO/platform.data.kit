apiVersion: data.infoblox.com/v1alpha1
kind: Transform
metadata:
  name: kafka-s3-pipeline
  namespace: analytics
  version: 1.0.0
  labels:
    team: data-platform
    domain: events
spec:
  runtime: generic-go
  mode: batch
  description: Consumes events from Kafka, transforms, writes to S3
  image: "${REGISTRY}/kafka-s3-pipeline:${VERSION}"
  env:
    - name: LOG_LEVEL
      value: info
  inputs:
    - asset: kafka-events
  outputs:
    - asset: processed-events
  schedule:
    cron: "0 */6 * * *"  # Every 6 hours
  timeout: 2h
  resources:
    cpu: "2"
    memory: "4Gi"
  lineage:
    enabled: true
    emitter: marquez
    namespace: analytics
