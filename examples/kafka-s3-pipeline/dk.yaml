apiVersion: datakit.infoblox.dev/v1alpha1
kind: Transform
metadata:
  name: kafka-s3-pipeline
  namespace: analytics
  version: 1.0.0
  labels:
    team: datakit
    domain: events
spec:
  runtime: generic-go
  mode: batch
  image: "${REGISTRY}/kafka-s3-pipeline:${VERSION}"
  env:
    - name: LOG_LEVEL
      value: info
  inputs:
    - dataset: kafka-events
  outputs:
    - dataset: processed-events
  trigger:
    policy: schedule
    schedule:
      cron: "0 */6 * * *"  # Every 6 hours
  timeout: 2h
  resources:
    cpu: "2"
    memory: "4Gi"
  lineage:
    enabled: true
    emitter: marquez
    namespace: analytics
