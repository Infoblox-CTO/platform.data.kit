apiVersion: datakit.infoblox.dev/v1alpha1
kind: DataSet
metadata:
  name: stg-database-claims
  version: "1.0.0"
  labels:
    domain: k8s-inventory
    tier: staging
spec:
  store: pg-warehouse
  table: staging.database_claims
  classification: internal
  schema:
    - name: cluster
      type: string
    - name: namespace
      type: string
    - name: claim_name
      type: string
    - name: database_name
      type: string
    - name: instance_label
      type: string
    - name: db_type
      type: string
    - name: status
      type: string
    - name: loaded_at
      type: timestamp
