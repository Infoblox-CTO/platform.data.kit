apiVersion: datakit.infoblox.dev/v1alpha1
kind: DataSet
metadata:
  name: stg-helm-releases
  version: "1.0.0"
  labels:
    domain: k8s-inventory
    tier: staging
spec:
  store: pg-warehouse
  table: staging.helm_releases
  classification: internal
  schema:
    - name: cluster
      type: string
    - name: namespace
      type: string
    - name: release_name
      type: string
    - name: chart_name
      type: string
    - name: chart_version
      type: string
    - name: app_version
      type: string
    - name: status
      type: string
    - name: loaded_at
      type: timestamp
