apiVersion: datakit.infoblox.dev/v1alpha1
kind: DataSet
metadata:
  name: k8s-deployments
  version: "1.0.0"
  labels:
    domain: k8s-inventory
    tier: raw
spec:
  store: s3-raw
  prefix: data/k8s-deployments/
  format: parquet
  classification: internal
  schema:
    - name: cluster
      type: string
    - name: namespace
      type: string
    - name: name
      type: string
    - name: replicas
      type: integer
    - name: image
      type: string
    - name: env_vars_json
      type: string
    - name: labels_json
      type: string
    - name: collected_at
      type: timestamp
